name: Build and Release APKs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-volunteer-app:
    name: Build Volunteer App APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Volunteer_App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter doctor -v

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/volunteer-app-release.apk

      - name: Upload Volunteer App APK Artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: volunteer-apk
          path: Volunteer_App/build/app/outputs/flutter-apk/volunteer-app-release.apk

  build-public-app:
    name: Build Public App APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Public_App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter doctor -v

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/public-app-release.apk

      - name: Upload Public App APK Artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: public-apk
          path: Public_App/build/app/outputs/flutter-apk/public-app-release.apk

  upload-release-assets:
    name: Upload APKs to Release
    runs-on: ubuntu-latest
    needs:
      - build-volunteer-app
      - build-public-app
    steps:
      - name: Download APK Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            release-assets/volunteer-apk/volunteer-app-release.apk
            release-assets/public-apk/public-app-release.apk
