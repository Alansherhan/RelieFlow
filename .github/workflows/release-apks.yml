name: Build and Release APKs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-volunteer-app:
    name: Build Volunteer App APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Volunteer_App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter doctor -v

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/volunteer-app-release.apk

      - name: Upload Volunteer App APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Volunteer_App/build/app/outputs/flutter-apk/volunteer-app-release.apk

  build-public-app:
    name: Build Public App APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Public_App
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter doctor -v

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/public-app-release.apk

      - name: Upload Public App APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Public_App/build/app/outputs/flutter-apk/public-app-release.apk
